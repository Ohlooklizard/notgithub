<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bedroom</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background-image: url("bedroom.jpg"); /* Background image */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat; /* nono repeat the image */
      overflow: hidden;
    }

        .photo-wrapper {
      width: 100%;
      height: 100%;
      cursor: grab;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* buttons */
.buttons {
    display: flex;
    justify-content: center;
    gap: 30px;
    position: relative;
}

.no-wrapper{
    position:relative;
}

.btn {
    width: 120px;
    cursor: pointer;
    user-select: none;
}

.yes-btn,
.no-btn {
width: 120px;
height: auto;
display: inline-block;
}

.yes-btn {
    position: relative;
    z-index: 2;
    transform-origin: center center;
    transition: transform 0.3s ease;
}

.no-btn {
    z-index: 1;
    position: relative;
    transition: transform 0.15s ease;
    cursor: default;
}

<button onclick="revealCoordinates()">Yes</button>

<div id="coordinate-toast" class="bottom-box">
  "just to check you’ve had enough coffee and “turned your brain on” - the coordinates to your first chamber are in the text above."
</div>
    
    
  </style>
</head>

  <body>

     <audio id="NoCakeAudio" src="nocakeforyou.mp3" loop></audio>
  
/* <!-- Letter Screen --> */
    <div id="letter-container"> 
      <div class="letter-window">

        <img src="letter2" class="letter" id="glados letter" />

        <div class="buttons" id="letter-buttons">
          <img src="yes.jpg" class="btn yes-btn" alt="Yes" />

          <div class="no-wrapper">
            <img src="no.jpg" class="btn no-btn" alt="No" />
          </div>
        </div>
        
        <bottom-box { 
  display: none;  
  position: fixed;
  bottom: 20px; 
  left: 50%;
  transform: translateX(-50%); 
  color: #0066cc; 
  font-weight: bold;
  text-align: center;
  background-color: #f0f8ff; 
  padding: 12px 24px;
  border-radius: 8px;
  box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
  z-index: 9999; 
  width: 90%;
  max-width: 600px;
}

.bottom-box.visible {
  display: block;
}

          </div>
  <script>
    
 const NoCakeAudio = document.getElementById("NoCakeAudio");

    function startNoCakeAudio() {
      peacefulAudio.volume = 0.35;
      peacefulAudio.play().catch(() => {
        // Browsers often block background audio until the first click/key press.
      });
    }

    window.addEventListener("load", startNoCakeAudio);

    ["click", "keydown", "dragstart"].forEach(eventName => {
      document.addEventListener(eventName, startNoCakeAudio, { once: true });
    });

     const letterImage = document.getElementById("letterImage");
     const noBtn = document.querySelector(".no-btn");
    const yesBtn = document.querySelector(".btn[alt='Yes']");

// move da NO btn

noBtn.addEventListener("mouseover", () => {
    const min = 200;
    const max = 200;

    const distance = Math.random() * (max - min) + min;
    const angle = Math.random() * Math.PI * 2;

    const moveX = Math.cos(angle) * distance;
    const moveY = Math.sin(angle) * distance;

    noBtn.style.transition = "transform 0.3s ease";
    noBtn.style.transform = `translate(${moveX}px, ${moveY}px)`;
});

    // YES 

yesBtn.addEventListener("click", () => {
   function revealCoordinates() {
  const toast = document.getElementById("coordinate-toast");
  toast.classList.add("visible");
}
  });
    
  </script>
</body>
</html>
